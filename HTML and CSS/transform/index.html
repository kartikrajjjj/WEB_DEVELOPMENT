<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRANSFORM</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>TRANSFORM</h1>
    <br />
    <p>PERSPECTIVE: 600 pixels</p>
    <div id="container">
      <div id="box1" class="box">ROTATE X 45deg</div>
      <div id="box2" class="box">ROTATE Y 45deg</div>
      <div id="box3" class="box">ROTATE Z 45deg</div>
      <div id="box4" class="box">SCALE 1.5 times</div>
      <div id="box5" class="box">SCALE X 1.5 times</div>
      <div id="box6" class="box">SCALE Y 1.5 times</div>
      <div id="box7" class="box">TRANSLATE-X 50px </div>
      <div id="box8" class="box">TRANSLATE-XY 50px each</div>
    </div>
  </body>
</html>
