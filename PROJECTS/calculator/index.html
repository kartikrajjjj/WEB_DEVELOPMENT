<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="calculator">
      <input type="text" id="textbox" readonly />

      <div id="button-container">
        <button
          id="clear"
          class="button"
          onclick="currentDisplay='';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          C
        </button>
        <button
          id="1"
          class="button"
          onclick="currentDisplay+='1';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          1
        </button>
        <button
          id="2"
          class="button"
          onclick="currentDisplay+='2';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          2
        </button>
        <button
          id="+"
          class="button"
          onclick="currentDisplay=currentDisplay+'+';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          +
        </button>
        <button
          id="3"
          class="button"
          onclick="currentDisplay+='3';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          3
        </button>
        <button
          id="4"
          class="button"
          onclick="currentDisplay+='4';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          4
        </button>
        <button
          id="-"
          class="button"
          onclick="currentDisplay+='-';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          -
        </button>
        <button
          id="5"
          class="button"
          onclick="currentDisplay+='5';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          5
        </button>
        <button
          id="6"
          class="button"
          onclick="currentDisplay+='6';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          6
        </button>
        <button
          id="*"
          class="button"
          onclick="currentDisplay+='*';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          *
        </button>
        <button
          id="7"
          class="button"
          onclick="currentDisplay+='7';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          7
        </button>
        <button
          id="8"
          class="button"
          onclick="currentDisplay+='8';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          8
        </button>
        <button
          id="/"
          class="button"
          onclick="currentDisplay+='/';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          /
        </button>
        <button
          id="="
          class="button"
          onclick="currentDisplay=eval(currentDisplay);
        document.querySelector('#textbox').value=currentDisplay;"
        >
          =
        </button>
        <button
          id="9"
          class="button"
          onclick="currentDisplay+='9';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          9
        </button>
        <button
          id="."
          class="button"
          onclick="currentDisplay+='.';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          .
        </button>
        <button
          id="0"
          class="button"
          onclick="currentDisplay+='0';
        document.querySelector('#textbox').value=currentDisplay;"
        >
          0
        </button>
        <button
          id="back"
          class="button"
          onclick="currentDisplay=currentDisplay.slice(0,-1);document.querySelector('#textbox').value=currentDisplay;"
        >
          back
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
