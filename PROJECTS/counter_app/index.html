<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COUNTER APP</title>
  </head>
  <link rel="stylesheet" href="style.css" />
  <body>
    <h1>COUNTER APP</h1>
    <div id="container">
      <button id="decrement" class="button" onclick="decrement()">-</button>
      <p id="number">0</p>
      <button id="increment" class="button" onclick="increment()">+</button>
    </div>
    <br><br><br>
    <button id="reset" class="button" onclick="reset()">RESET</button>

    <script src="script.js"></script>
  </body>
</html>
