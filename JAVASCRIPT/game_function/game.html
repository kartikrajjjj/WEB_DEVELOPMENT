<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game</title>
    <link rel="stylesheet" href="game.css" />
  </head>
  <body>
    <div id="container">
      <div><h1>STONE PAPER SCISSOR GAME (USING FUNCTIONS)</h1></div>
      <div><p>SELECT YOUR CHOICE:</p></div>
      <button id="stone" class="button" onclick="evaluateResult('stone') ">
        STONE
      </button>

      <button id="paper" class="button" onclick="evaluateResult('paper') ">
        PAPER
      </button>

      <button id="scissor" class="button" onclick="evaluateResult('scissor') ">
        SCISSOR
      </button>
    </div>
    <p>RESULTS:</p>
    <p id="result"></p>
    <p id="scoreboard">
      WIN: <br />
      LOST: <br />
      DRAW:
    </p>

    <script src="game.js"></script>
  </body>
</html>
