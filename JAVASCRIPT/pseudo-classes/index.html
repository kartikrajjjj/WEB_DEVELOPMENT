<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSEUDO CLASSES</title>
    <style>
        .button{
            height: 30px;
            width: 150px;
            background-color: rgb(55, 231, 64);
            border: 2px solid black;
            border-radius: 10%;
        }
        .button:hover{
            height: 35px;
            width: 170px;
            background-color: coral;
            border: 2px solid black;
            border-radius: 10%;
        }
        .button:active{
            height: 35px;
            width: 170px;
            background-color: rgb(173, 56, 13);
            border: 2px solid black;
            border-radius: 10%;
        }
    </style>
</head>
<body>
    <h1>PSEUDO CLASSES</h1>
    <button class="button"> CLICK ME</button>
</body>
</html>
