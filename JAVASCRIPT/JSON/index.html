<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON</title>
</head>
<body>
    

    <script>
        let product={
            name:'shirt',
            company:'zara',
            price:1099,
            rating:{
                stars:4.9,
                noOfRatings:1000,
            },
        };
        console.log(typeof product);
        console.log(product);
        let str= JSON.stringify(product);
        console.log(typeof str);
        console.log(str);


        let product2=JSON.parse(str);
        console.log(typeof product2);
        console.log(product2);
    </script>
</body>
</html>
