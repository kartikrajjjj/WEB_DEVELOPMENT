<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>practice</title>
    <style>
        .problem3{
            font-size: 15px;
            height: 30px;
            width: 100px;
            background-color: crimson;
            color: white;
            border-radius: 10px;
        }

        .js-sizeDouble{
            font-size: 30px;
            height: 60px;
            width: 200px;
            background-color: crimson;
            color: white;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Practice exercise</h1>
    <p>Open inspect -> console for outputs</p>
    <button class="problem3" >Problem 3</button>
    <script>
     // Create a variable multiply and assign a function to this variable that multiplies two numbers. Call this method from the variable.

    let multiply =(num1,num2) => num1 * num2;
    console.log(multiply(8,9));

    // Create a function runTwice that takes a function as a parameter and then runs that method twice.
    let printHello = () => console.log('Hello');

    let runTwice = printHellos =>{
        printHellos();
        printHellos();
    };
    runTwice(printHello);

    // Create a button which should grow double in size on clicking after 2 seconds
    function doubleTheSize(){
        let buttonElement=document.querySelector('.problem3');
        buttonElement.classList.add('js-sizeDouble');
    }


    // In the above exercise add the behavior using an event listener instead of onclick
        let buttonElement=document.querySelector('.problem3');
        buttonElement.addEventListener('click',event =>{
            setTimeout(doubleTheSize, 2000);
        });


    // Create a function that sums an array of numbers. Do this using a for-each loop

    const arr=[1,2,3,4,5,6,7,8,9];
    let sum=0;
    arr.forEach(element => {
        sum += element;
    });console.log(sum);



    // Create a function that takes an array of numbers and return their squares using map function.
        let squares = arr.map(num =>  num*num);
        console.log(squares);


    </script>
    
</body>
</html>
