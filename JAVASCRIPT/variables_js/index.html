<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VARIABLES</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button
      id="button1"
      class="button"
      onclick="quantity++;document.querySelector('#output').innerText = `YOUR BAG HAS ${quantity} ITEMS.`;"
    >
      Add to Bag
    </button>
    <button
      id="button2"
      onclick=" if(quantity>0) 
      {quantity--;}
      document.querySelector('#output').innerText = `YOUR BAG HAS ${quantity} ITEMS.`;"
    >
      MOVE TO WISHLIST
    </button>
    <button
      id="button3"
      class="button"
      onclick="quantity+=2;document.querySelector('#output').innerText = `YOUR BAG HAS ${quantity} ITEMS.`;"
    >
      Add 1+1 sale item
    </button>

    <h1 id="output"></h1>

    <script>
      let quantity = 0;
      document.querySelector(
        "#output"
      ).innerText = `YOUR BAG HAS ${quantity} ITEMS.`;
    </script>
  </body>
</html>
